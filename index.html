<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio QR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div class="container">
        <header>
            <h1>Audio QR</h1>
            <p class="subtitle">Share audio via QR Code</p>
            <div class="install-section" id="installSection" style="display: none;">
                <button id="installBtn" class="btn btn-secondary">Add to Home Screen</button>
            </div>
        </header>

        <main>
            <div class="upload-section">
                <div class="input-group">
                    <label for="audioName">Student Name</label>
                    <input type="text" id="audioName" placeholder="Enter student name" required>
                </div>

                <div class="input-group">
                    <label for="audioInput">Audio File</label>
                    <div class="file-drop" id="fileDrop">
                        <input type="file" id="audioInput" accept="audio/ogg,audio/opus,.opus,.ogg" hidden>
                        <div class="file-drop-content">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p class="drop-text">Click or drag audio file</p>
                            <p class="drop-hint">Accepted formats: OPUS, OGG</p>
                        </div>
                    </div>
                    <div id="fileName" class="file-name"></div>
                </div>

                <div class="crop-section" id="cropSection" style="display: none;">
                    <div class="input-group">
                        <label>Preview and Crop</label>
                        <div class="waveform-container">
                            <canvas id="waveformCanvas" width="600" height="120"></canvas>
                            <div class="waveform-overlay" id="waveformOverlay"></div>
                        </div>
                        <div class="time-controls">
                            <div class="time-input">
                                <label for="startTime">Start (s):</label>
                                <input type="number" id="startTime" min="0" value="0" step="0.1">
                            </div>
                            <div class="time-input">
                                <label for="endTime">End (s):</label>
                                <input type="number" id="endTime" min="0" step="0.1">
                            </div>
                            <span class="duration-display">Duration: <span id="durationDisplay">0</span>s</span>
                        </div>
                        <div class="range-sliders">
                            <input type="range" id="startSlider" min="0" max="100" value="0" class="slider">
                            <input type="range" id="endSlider" min="0" max="100" value="100" class="slider">
                        </div>
                        <div class="crop-actions">
                            <button id="previewBtn" class="btn btn-secondary" style="flex: 1;">Preview Selection</button>
                            <button id="resetCropBtn" class="btn btn-secondary" style="flex: 1;">Reset</button>
                        </div>
                    </div>
                </div>

                <button id="generateBtn" class="btn btn-primary">Generate QR Code</button>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="audio-player">
                    <h2 id="displayName"></h2>
                    <audio id="audioPlayer" controls></audio>
                    <div class="action-buttons">
                        <button id="downloadBtn" class="btn btn-secondary">Download QR Code</button>
                        <button id="shareBtn" class="btn btn-secondary">Share QR Code</button>
                    </div>
                </div>

                <div class="qrcode-section">
                    <div id="qrcode"></div>
                    <p class="qrcode-hint">Scan to listen to audio</p>
                </div>
            </div>
        </main>

        <footer>
            <p class="developer">developed by Emmanuel</p>
            <p class="sharing-note">QR Code works on same device. Deploy for cross-device sharing.</p>
        </footer>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
