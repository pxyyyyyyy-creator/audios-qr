<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áudio QR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div class="container">
        <header id="mainHeader">
            <h1>Áudio QR</h1>
            <p class="subtitle">Compartilhe áudios através de QR Codes</p>
            <div class="install-section" id="installSection" style="display: none;">
                <button id="installBtn" class="btn btn-secondary">Adicionar à Tela Inicial</button>
            </div>
        </header>

        <main>
            <div class="upload-section" id="uploadSection">
                <div class="input-group">
                    <label for="audioName">Nome do Aluno</label>
                    <input type="text" id="audioName" placeholder="Digite o nome do aluno" required>
                </div>

                <div class="input-group">
                    <label for="audioInput">Arquivo de Áudio</label>
                    <div class="file-drop" id="fileDrop">
                        <input type="file" id="audioInput" accept="audio/ogg,audio/opus,.opus,.ogg" hidden>
                        <div class="file-drop-content">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p class="drop-text">Clique ou arraste um arquivo de áudio</p>
                            <p class="drop-hint">Formatos aceitos: OPUS, OGG</p>
                        </div>
                    </div>
                    <div id="fileName" class="file-name"></div>
                </div>

                <div class="crop-section" id="cropSection" style="display: none;">
                    <div class="input-group">
                        <label>Visualizar e Recortar</label>
                        <div class="waveform-container">
                            <canvas id="waveformCanvas" width="600" height="120"></canvas>
                            <div class="waveform-overlay" id="waveformOverlay"></div>
                        </div>
                        <div class="time-controls">
                            <div class="time-input">
                                <label for="startTime">Início (s):</label>
                                <input type="number" id="startTime" min="0" value="0" step="0.1">
                            </div>
                            <div class="time-input">
                                <label for="endTime">Fim (s):</label>
                                <input type="number" id="endTime" min="0" step="0.1">
                            </div>
                            <span class="duration-display">Duração: <span id="durationDisplay">0</span>s</span>
                        </div>
                        <div class="range-sliders">
                            <input type="range" id="startSlider" min="0" max="100" value="0" class="slider">
                            <input type="range" id="endSlider" min="0" max="100" value="100" class="slider">
                        </div>
                        <div class="crop-actions">
                            <button id="previewBtn" class="btn btn-secondary" style="flex: 1;">Ouvir Seleção</button>
                            <button id="resetCropBtn" class="btn btn-secondary" style="flex: 1;">Redefinir</button>
                        </div>
                    </div>
                </div>

                <button id="generateBtn" class="btn btn-primary">Gerar QR Code</button>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="audio-player">
                    <h2 id="displayName"></h2>
                    <audio id="audioPlayer" controls></audio>
                </div>

                <div class="qrcode-section">
                    <div id="qrcode"></div>
                    <p class="qrcode-hint">Escaneie para escutar o áudio</p>
                    <div class="action-buttons">
                        <button id="downloadBtn" class="btn btn-secondary">Baixar Imagem do QR</button>
                        <button id="shareBtn" class="btn btn-secondary">Compartilhar Link do QR</button>
                    </div>
                </div>
            </div>

            <div id="viewerSection" style="display: none; text-align: center; padding: 40px 20px;">
                <h2 id="viewerName" style="margin-bottom: 20px; font-weight: bold; color: #1a1a1a;"></h2>
                <audio id="viewerAudio" controls style="width: 100%; max-width: 400px; margin: 0 auto; display: block;"></audio>
                <div style="margin-top: 50px;">
                    <button id="createOwnBtn" class="btn btn-primary" style="width: auto; padding: 10px 20px; font-size: 14px;">Criar novo QR Code</button>
                </div>
            </div>
        </main>

        <footer>
            <p class="developer">desenvolvido por Emmanuel</p>
        </footer>
    </div>

    <script src="script.js?v=4"></script>
</body>
</html>
